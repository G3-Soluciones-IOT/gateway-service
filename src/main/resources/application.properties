spring.application.name=gateway-service
spring.config.import=optional:configserver:${CONFIG_SERVER_URI:http://config-service:8888}
# spring.cloud.config.fail-fast=true
spring.cloud.config.retry.max-attempts=20
spring.cloud.config.retry.initial-interval=1000
spring.cloud.config.retry.max-interval=3000
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
spring.security.oauth2.resource-server.jwt.issuer-uri=${AUTH0_ISSUER_URI:https://auth0.local/}
auth0.audience=${AUTH0_AUDIENCE:jameofit-api}
legacy.jwt.enabled=${LEGACY_JWT_ENABLED:true}
legacy.jwt.issuer=${LEGACY_JWT_ISSUER:${JWT_ISSUER:iam-service}}
legacy.jwt.jwk-set-uri=${LEGACY_JWT_JWK_SET_URI:${JWT_JWKS_URI:${JWT_JWK_SET_URI:${IAM_JWKS_URI:http://iam-service:8081/api/v1/jwks/.well-known/jwks.json}}}}
